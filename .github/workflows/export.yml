name: Release

on:
  push:
    branches:
      - release
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  export_game:
    if: github.ref_name == 'release'
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.version.outputs.tag }}
      version: ${{ steps.version.outputs.version }}
    permissions:
      contents: read
    name: Export Game
    env:
      GODOT_VERSION: 4.6.3-stable
    steps:
      - name: checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: resolve release version
        id: version
        shell: pwsh
        run: |
          $project = Get-Content project.godot -Raw
          if ($project -notmatch '(?m)^config/version="([^"]+)"$') {
            throw 'project.godot must define application config/version.'
          }

          $version = $Matches[1]
          if ($version -notmatch '^(0|[1-9]\d*)\.(0|[1-9]\d*)\.(0|[1-9]\d*)(?:-[0-9A-Za-z-]+(?:\.[0-9A-Za-z-]+)*)?(?:\+[0-9A-Za-z-]+(?:\.[0-9A-Za-z-]+)*)?$') {
            throw "project.godot config/version must be a semantic version. Actual: '$version'"
          }

          $tag = "v$version"
          $remoteTag = git ls-remote --tags origin "refs/tags/$tag"
          if ($remoteTag) {
            throw "Release tag already exists: $tag"
          }

          "version=$version" >> $env:GITHUB_OUTPUT
          "tag=$tag" >> $env:GITHUB_OUTPUT

      - name: prepare release metadata
        shell: pwsh
        run: |
          $version = '${{ steps.version.outputs.version }}'
          $match = [regex]::Match($version, '^(?<major>0|[1-9]\d*)\.(?<minor>0|[1-9]\d*)\.(?<patch>0|[1-9]\d*)')
          if (-not $match.Success) {
            throw "Invalid semantic version: $version"
          }

          $shortVersion = "{0}.{1}.{2}" -f $match.Groups["major"].Value, $match.Groups["minor"].Value, $match.Groups["patch"].Value
          $windowsFileVersion = "$shortVersion.0"
          $content = Get-Content export_presets.cfg -Raw
          $content = $content -replace 'application/file_version="[^"]*"', "application/file_version=`"$windowsFileVersion`""
          $content = $content -replace 'application/product_version="[^"]*"', "application/product_version=`"$version`""
          $content = $content -replace 'application/short_version="[^"]*"', "application/short_version=`"$shortVersion`""
          $content = $content -replace 'application/version="[^"]*"', "application/version=`"$version`""
          Set-Content export_presets.cfg -Value $content -NoNewline

      - name: export game
        id: export
        uses: firebelley/godot-export@v8.0.0
        with:
          godot_executable_download_url: https://github.com/godotengine/godot/releases/download/${{ env.GODOT_VERSION }}/Godot_v${{ env.GODOT_VERSION }}_mono_linux_x86_64.zip
          godot_export_templates_download_url: https://github.com/godotengine/godot/releases/download/${{ env.GODOT_VERSION }}/Godot_v${{ env.GODOT_VERSION }}_mono_export_templates.tpz
          relative_project_path: ./
          presets_to_export: Linux/X11,Windows,macOS
          archive_output: true

      - name: upload raw export archives
        uses: actions/upload-artifact@v4
        with:
          name: raw-export-archives
          path: ${{ steps.export.outputs.archive_directory }}/*
          if-no-files-found: error

  package_release:
    needs: export_game
    runs-on: macos-latest
    permissions:
      attestations: write
      contents: write
      id-token: write
    name: Package Release
    steps:
      - name: checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: download raw export archives
        uses: actions/download-artifact@v4
        with:
          name: raw-export-archives
          path: raw-export-archives

      - name: re-sign macOS app and name release archives
        id: artifacts
        shell: bash
        run: |
          set -euo pipefail

          version='${{ needs.export_game.outputs.version }}'
          release_dir="$RUNNER_TEMP/release-artifacts"
          mac_work_dir="$RUNNER_TEMP/macos-work"
          mkdir -p "$release_dir" "$mac_work_dir"

          archives=()
          while IFS= read -r -d '' archive; do
            archives+=("$archive")
          done < <(find raw-export-archives -type f -name '*.zip' -print0)

          if [ "${#archives[@]}" -eq 0 ]; then
            echo "No export archives were downloaded." >&2
            exit 1
          fi

          mac_archive=''
          for archive in "${archives[@]}"; do
            archive_name="$(basename "$archive")"
            if [ "${archive_name%.zip}" = 'macOS' ]; then
              mac_archive="$archive"
              break
            fi
          done

          if [ -z "$mac_archive" ]; then
            printf 'macOS export archive not found. Archives:' >&2
            printf ' %s' "${archives[@]##*/}" >&2
            printf '\n' >&2
            exit 1
          fi

          for archive in "${archives[@]}"; do
            if [ "$archive" = "$mac_archive" ]; then
              continue
            fi

            base_name="$(basename "${archive%.zip}")"
            case "$base_name" in
              *Windows*) platform='Windows' ;;
              *Linux*) platform='Linux' ;;
              *) platform="$(printf '%s' "$base_name" | sed 's/[^0-9A-Za-z._-]/-/g')" ;;
            esac

            cp "$archive" "$release_dir/Tempora-v$version-$platform.zip"
          done

          ditto -x -k "$mac_archive" "$mac_work_dir"
          app="$(find "$mac_work_dir" -type d -name '*.app' -print | head -n 1)"
          if [ -z "$app" ]; then
            echo "No .app bundle found in $(basename "$mac_archive")." >&2
            exit 1
          fi

          xattr -cr "$app"
          codesign --force --deep --sign - "$app"
          codesign --verify --deep --strict --verbose=4 "$app"

          signature="$(codesign -dv --verbose=4 "$app" 2>&1)"
          if printf '%s\n' "$signature" | grep -Eq '\(adhoc,runtime\)|Runtime Version='; then
            echo 'macOS app is still signed with hardened runtime.' >&2
            exit 1
          fi

          mac_zip="$release_dir/Tempora-v$version-macOS.zip"
          (
            cd "$(dirname "$app")"
            ditto -c -k --keepParent "$(basename "$app")" "$mac_zip"
          )

          echo "directory=$release_dir" >> "$GITHUB_OUTPUT"

      - name: push release tag
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a '${{ needs.export_game.outputs.tag }}' -m '${{ needs.export_game.outputs.tag }}'
          git push origin '${{ needs.export_game.outputs.tag }}'

      - name: attest release artifacts
        uses: actions/attest-build-provenance@v4.1.0
        with:
          subject-path: ${{ steps.artifacts.outputs.directory }}/*

      - name: create release
        id: release
        continue-on-error: true
        uses: ncipollo/release-action@v1.21.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          generateReleaseNotes: true
          immutableCreate: true
          tag: ${{ needs.export_game.outputs.tag }}
          commit: ${{ github.sha }}
          artifactErrorsFailBuild: true
          artifacts: ${{ steps.artifacts.outputs.directory }}/*

      - name: rollback release tag after upload failure
        if: steps.release.outcome == 'failure'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if ! gh release delete '${{ needs.export_game.outputs.tag }}' --cleanup-tag --yes 2>/dev/null; then
            git push --delete origin '${{ needs.export_game.outputs.tag }}'
          fi
          echo "Release upload failed; cleaned up release tag ${{ needs.export_game.outputs.tag }}." >&2
          exit 1
